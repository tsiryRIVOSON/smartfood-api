<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test SmartFood API</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; background: #f9f9f9; }
        h1 { color: #e74c3c; text-align: center; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        button { background: #27ae60; color: white; padding: 15px 30px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; width: 100%; }
        button:hover { background: #219a52; }
        #resultat { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 10px; text-align: center; }
        select, input { padding: 10px; margin: 5px; width: 100%; border: 2px solid #ddd; border-radius: 5px; font-size: 16px; }
        .form-group { margin: 15px 0; }
        label { font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍔 Test API SmartFood</h1>
    <p style="text-align:center; color:#666;">Interface de test créée par TELOS</p>

    <div class="form-group">
        <label>Taille du menu :</label>
        <select id="taille">
            <option value="Normal">Normal</option>
            <option value="Maxi">Maxi (+2€)</option>
        </select>
    </div>

    <div class="form-group">
        <label>Option Vegan :</label>
        <select id="vegan">
            <option value="false">Non</option>
            <option value="true">Oui (+1.50€)</option>
        </select>
    </div>

    <div class="form-group">
        <label>Distance de livraison (km) :</label>
        <input type="number" id="distance" value="3" min="0">
    </div>

    <div class="form-group">
        <label>Heure de commande (0-23) :</label>
        <input type="number" id="heure" value="10" min="0" max="23">
    </div>

    <button onclick="commander()">🍽️ Commander</button>

    <div id="resultat">
        <h3>💰 Prix total</h3>
        <p id="prix" style="font-size: 28px; color: #27ae60; font-weight: bold;">-- €</p>
        <p id="details" style="color:#666;"></p>
    </div>
</div>

<script>
async function commander() {
    const taille = document.getElementById('taille').value;
    const estVegan = document.getElementById('vegan').value === 'true';
    const distanceKm = parseInt(document.getElementById('distance').value);
    const heure = parseInt(document.getElementById('heure').value);

    try {
        const response = await fetch('http://localhost:3000/api/food-order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ taille, estVegan, distanceKm, heure })
        });

        const data = await response.json();
        document.getElementById('prix').innerHTML = data.total + ' €';
        
        let details = 'Menu : ' + (taille === 'Maxi' ? 'Maxi' : 'Normal');
        details += ' | Vegan : ' + (estVegan ? 'Oui' : 'Non');
        details += ' | Distance : ' + distanceKm + 'km';
        details += ' | Heure : ' + heure + 'h';
        document.getElementById('details').innerHTML = details;
    } catch (error) {
        document.getElementById('prix').innerHTML = 'Erreur';
        document.getElementById('details').innerHTML = 'Vérifiez que le serveur est lancé sur le port 3000';
    }
}
</script>

</body>
</html>
